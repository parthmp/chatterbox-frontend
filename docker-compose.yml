services:
  frontend:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: docker.dev/Dockerfile
    image: chatterbox-frontend:1.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    networks:
      - chatterbox_net

networks:
  chatterbox_net:
    driver: bridge